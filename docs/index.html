<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Olimpiadas Tecnología e Informática · IE La Candelaria</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="img/escudo.jpg" alt="Escudo IE La Candelaria" class="brand-logo">
      <div class="brand-text">
        <strong>IE La Candelaria</strong>
        <span>Olimpiadas de Tecnología e Informática 2026</span>
      </div>
    </div>
    <nav class="topnav">
      <a href="#/" data-route="/">Estudiante</a>
      <a href="#/area" data-route="/area">Área</a>
      <a href="#/coordinacion" data-route="/coordinacion">Coordinación</a>
      <a href="#/rector" data-route="/rector">Rectoría</a>
      <a href="#/admin" data-route="/admin" class="nav-admin">Admin</a>
    </nav>
  </header>

  <main id="app" class="container"></main>

  <footer class="footer">
    <span>IE La Candelaria · Olimpiadas 2026</span>
    <span class="muted">Los datos se actualizan al cierre de cada prueba</span>
  </footer>

  <template id="tpl-student">
    <section class="card">
      <h1>Consulta tu resultado</h1>
      <p class="muted">Ingresa tu código de matrícula tal como aparece en tu carnet.</p>
      <form id="student-form" class="form-inline">
        <label for="mat">Matrícula</label>
        <input id="mat" name="mat" type="text" inputmode="numeric" autocomplete="off" required maxlength="10" placeholder="ej. 250190">
        <button type="submit">Ver resultado</button>
      </form>
      <p id="student-error" class="error" hidden></p>
    </section>
    <section id="student-result" hidden></section>
  </template>

  <template id="tpl-admin-login">
    <section class="card">
      <h1 data-role-title>Acceso</h1>
      <p class="muted">Ingresa el PIN para ver los resultados.</p>
      <form id="admin-form" class="form-inline">
        <label for="pin">PIN</label>
        <input id="pin" name="pin" type="password" autocomplete="off" required>
        <button type="submit">Entrar</button>
      </form>
      <p id="admin-error" class="error" hidden></p>
    </section>
  </template>

  <template id="tpl-admin-superdashboard">
    <section class="card">
      <div class="row">
        <h1 data-role-title>Panel · Administrador</h1>
        <button id="logout" class="ghost">Cerrar sesión</button>
      </div>

      <div class="tabs">
        <button data-tab="overview" class="tab-btn active">Resumen</button>
        <button data-tab="upload" class="tab-btn">Subir escaneos</button>
        <button data-tab="scans" class="tab-btn">Archivos subidos</button>
        <button data-tab="settings" class="tab-btn">Configuración</button>
      </div>

      <div data-tab-panel="overview" class="tab-panel">
        <div id="kpis" class="kpis"></div>
        <div class="filters">
          <label>Grado <select id="filter-grade"><option value="">Todos</option></select></label>
          <label>Grupo <select id="filter-group"><option value="">Todos</option></select></label>
          <label>Buscar <input id="filter-search" type="search" placeholder="Nombre o matrícula"></label>
          <button id="export-csv">Exportar CSV</button>
          <button id="export-xlsx" class="ghost">Exportar Excel</button>
        </div>
        <div class="grid-2">
          <div><h2>Promedio por grupo</h2><canvas id="chart-group" height="180"></canvas></div>
          <div><h2>% de aciertos por pregunta</h2><canvas id="chart-question" height="180"></canvas></div>
        </div>
        <h2>Ranking</h2>
        <div class="table-wrap">
          <table id="ranking">
            <thead><tr><th>#</th><th>Matrícula</th><th>Nombre</th><th>Grupo</th><th>Grado</th><th>Puntaje</th><th>%</th><th>Nota</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div data-tab-panel="upload" class="tab-panel" hidden>
        <h2>Subir hojas de respuestas escaneadas</h2>
        <p class="muted">Sube los PDFs de las hojas de respuestas ya escaneadas. Los archivos se guardan en la carpeta <code>scans/&lt;grupo&gt;/</code> del repo. Después de subir se procesan localmente con el lector OMR para generar los resultados.</p>

        <div id="token-block" class="alert">
          <strong>Token requerido.</strong> Necesitas un Personal Access Token de GitHub con permiso de escritura sobre este repo.
          <details>
            <summary>¿Cómo lo obtengo?</summary>
            <ol style="margin:6px 0 0 18px">
              <li>Entra a <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">github.com/settings/personal-access-tokens/new</a></li>
              <li>Repository access: <em>Only select repositories</em> → <code>olimpiadas-tic-candelaria</code></li>
              <li>Permisos: <em>Contents: Read and write</em></li>
              <li>Copia el token y pégalo abajo. El token se guarda solo en la sesión del navegador.</li>
            </ol>
          </details>
          <div class="form-inline" style="margin-top:10px">
            <label>Token <input id="gh-token" type="password" placeholder="github_pat_..." autocomplete="off"></label>
            <button id="save-token">Guardar token</button>
            <button id="clear-token" class="ghost">Olvidar token</button>
          </div>
          <p id="token-status" class="muted" style="margin-top:8px"></p>
        </div>

        <div id="upload-block" hidden>
          <div class="form-inline" style="margin-top:18px">
            <label>Grupo destino
              <select id="upload-group"></select>
            </label>
          </div>
          <div id="dropzone" class="dropzone">
            <p>Arrastra los PDFs aquí o haz clic para seleccionar</p>
            <input id="file-input" type="file" accept="application/pdf" multiple hidden>
          </div>
          <div id="upload-list"></div>
        </div>
      </div>

      <div data-tab-panel="scans" class="tab-panel" hidden>
        <h2>Archivos subidos</h2>
        <p class="muted">Listado de hojas escaneadas en el repo.</p>
        <div class="filters">
          <label>Grupo
            <select id="scans-group-filter"><option value="">Todos</option></select>
          </label>
          <button id="scans-refresh" class="ghost">Refrescar</button>
        </div>
        <div id="scans-list" class="table-wrap"></div>
      </div>

      <div data-tab-panel="settings" class="tab-panel" hidden>
        <h2>Configuración</h2>
        <p class="muted">Información del repositorio y enlaces útiles.</p>
        <ul>
          <li><strong>Repo:</strong> <a href="https://github.com/jcano18-byte/olimpiadas-tic-candelaria" target="_blank">jcano18-byte/olimpiadas-tic-candelaria</a></li>
          <li><strong>Pages:</strong> <a href="https://jcano18-byte.github.io/olimpiadas-tic-candelaria/" target="_blank">jcano18-byte.github.io/olimpiadas-tic-candelaria</a></li>
          <li><strong>Cambiar PINs:</strong> editar <code>docs/js/auth.js</code> con nuevos hashes SHA-256</li>
          <li><strong>Regenerar JSON:</strong> <code>python scripts/build_web_data.py</code></li>
        </ul>
      </div>
    </section>
  </template>

  <template id="tpl-admin-dashboard">
    <section class="card">
      <div class="row">
        <h1 data-role-title>Panel</h1>
        <button id="logout" class="ghost">Cerrar sesión</button>
      </div>

      <div id="kpis" class="kpis"></div>

      <div class="filters">
        <label>Grado
          <select id="filter-grade"><option value="">Todos</option></select>
        </label>
        <label>Grupo
          <select id="filter-group"><option value="">Todos</option></select>
        </label>
        <label>Buscar
          <input id="filter-search" type="search" placeholder="Nombre o matrícula">
        </label>
        <button id="export-csv">Exportar CSV</button>
          <button id="export-xlsx" class="ghost">Exportar Excel</button>
      </div>

      <div class="grid-2">
        <div>
          <h2>Promedio por grupo</h2>
          <canvas id="chart-group" height="180"></canvas>
        </div>
        <div>
          <h2>% de aciertos por pregunta</h2>
          <canvas id="chart-question" height="180"></canvas>
        </div>
      </div>

      <h2>Ranking</h2>
      <div class="table-wrap">
        <table id="ranking">
          <thead>
            <tr><th>#</th><th>Matrícula</th><th>Nombre</th><th>Grupo</th><th>Grado</th><th>Puntaje</th><th>%</th><th>Nota</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/student.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/superadmin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
